site_name: Macro Flux
site_description: Daily Macro & Cross-Asset Trading Note
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
plugins:
  - search
  - callouts
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
