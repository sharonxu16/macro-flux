name: Daily Macro Briefing

on:
  schedule:
    # HKT 8:20 AM = UTC 00:20, 8:30 AM backup = UTC 00:30.
    # HKT 9:20/9:30/10:30 AM are late backups for delayed/missed GitHub runners.
    # HKT 6:20 PM = UTC 10:20, 6:30 PM backup = UTC 10:30.
    # HKT 6:40/6:50/7:00/8:30 PM are late backups for delayed/missed GitHub runners.
    # Keep these as separate entries so delayed GitHub runners still know
    # which report/window the scheduled event was intended to generate.
    - cron: '20 0 * * *'
    - cron: '30 0 * * *'
    - cron: '20 1 * * *'
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'
    - cron: '20 10 * * *'
    - cron: '30 10 * * *'
    - cron: '40 10 * * *'
    - cron: '50 10 * * *'
    - cron: '0 11 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      briefing_type:
        description: "Which briefing to generate"
        type: choice
        required: true
        default: morning
        options:
          - morning
          - afternoon
      run_date_hkt:
        description: "Target HKT date, YYYY-MM-DD. Leave blank for today."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-macro-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine briefing type
        id: type
        run: |
          python - <<'PY'
          import os
          from datetime import date, datetime, timedelta, timezone

          schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          manual_type = os.environ.get("INPUT_BRIEFING_TYPE", "").strip()
          manual_date = os.environ.get("INPUT_RUN_DATE_HKT", "").strip()
          now_hkt = datetime.now(timezone.utc) + timedelta(hours=8)

          morning_schedules = {"20 0 * * *", "30 0 * * *", "20 1 * * *", "30 1 * * *", "30 2 * * *"}
          afternoon_schedules = {"20 10 * * *", "30 10 * * *", "40 10 * * *", "50 10 * * *", "0 11 * * *", "30 12 * * *"}

          def target_date_for(label):
              if label == "morning":
                  return now_hkt.date() if now_hkt.hour >= 6 else now_hkt.date() - timedelta(days=1)
              if label == "afternoon":
                  return now_hkt.date() if now_hkt.hour >= 12 else now_hkt.date() - timedelta(days=1)
              raise SystemExit(f"Unsupported briefing_type: {label}")

          if event_name == "schedule":
              if schedule in morning_schedules:
                  briefing_type = "morning"
              elif schedule in afternoon_schedules:
                  briefing_type = "afternoon"
              else:
                  # GitHub can deliver delayed scheduled jobs with a blank/unexpected schedule
                  # string. Before 06:00 HKT, treat it as a delayed prior-day afternoon run
                  # instead of generating a future morning window.
                  if now_hkt.hour < 6:
                      briefing_type = "afternoon"
                  elif now_hkt.hour < 12:
                      briefing_type = "morning"
                  else:
                      briefing_type = "afternoon"
                  print(f"Unrecognized schedule {schedule!r}; inferred {briefing_type} from HKT time {now_hkt:%Y-%m-%d %H:%M}")
              target_date = target_date_for(briefing_type)
          else:
              briefing_type = manual_type or "morning"
              if manual_date:
                  target_date = date.fromisoformat(manual_date)
              else:
                  target_date = now_hkt.date()

          if briefing_type == "morning":
              start = f"{target_date - timedelta(days=1)} 18:00"
              end = f"{target_date} 08:00"
              flag = "--morning"
          elif briefing_type == "afternoon":
              start = f"{target_date} 08:00"
              end = f"{target_date} 18:00"
              flag = "--afternoon"
          else:
              raise SystemExit(f"Unsupported briefing_type: {briefing_type}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"flag={flag}", file=f)
              print(f"label={briefing_type}", file=f)
              print(f"window_from={start}", file=f)
              print(f"window_to={end}", file=f)
              print(f"target_date={target_date}", file=f)

          print(f"Selected {briefing_type}: {start} -> {end} HKT")
          PY
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_BRIEFING_TYPE: ${{ inputs.briefing_type }}
          INPUT_RUN_DATE_HKT: ${{ inputs.run_date_hkt }}

      - name: Skip existing scheduled briefing
        id: existing
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPORT_PATH: docs/past/${{ steps.type.outputs.target_date }}-${{ steps.type.outputs.label }}.md
        run: |
          if [ "$EVENT_NAME" = "schedule" ] && [ -s "$REPORT_PATH" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled briefing already exists at $REPORT_PATH; skipping duplicate backup run."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        if: steps.existing.outputs.skip != 'true'
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_MODEL: deepseek-v4-pro
          BRIEFING_REPO_PATH: ${{ github.workspace }}
          RUN_ARTIFACTS_DIR: run_artifacts
          PYTHONUNBUFFERED: "1"
          FETCH_ROUND_TIMEOUT_SECONDS: "180"
          ENHANCE_TIMEOUT_SECONDS: "90"
          LLM_TIMEOUT_SECONDS: "240"
          RUN_TIMEOUT_SECONDS: "3000"
        run: |
          set -o pipefail
          python morning_briefing.py ${{ steps.type.outputs.flag }} --from "${{ steps.type.outputs.window_from }}" --to "${{ steps.type.outputs.window_to }}" 2>&1 | tee briefing-run.log

      - name: Upload briefing debug artifacts
        if: always() && steps.existing.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: briefing-debug-${{ github.run_id }}
          path: |
            briefing-run.log
            run_artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit and push
        if: steps.existing.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate ${{ steps.type.outputs.label }} briefing for ${{ steps.type.outputs.target_date }}"
            git push origin main
          fi

      - name: Build site
        if: steps.existing.outputs.skip != 'true'
        run: |
          pip install mkdocs-material mkdocs-callouts
          mkdocs build

      - name: Upload GitHub Pages artifact
        if: steps.existing.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.existing.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send email notification
        if: steps.existing.outputs.skip != 'true'
        env:
          BRIEFING_EMAIL_RECIPIENTS: ${{ secrets.BRIEFING_EMAIL_RECIPIENTS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          REPORT_PATH: docs/past/${{ steps.type.outputs.target_date }}-${{ steps.type.outputs.label }}.md
          BRIEFING_LABEL: ${{ steps.type.outputs.label }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import morning_briefing as mb

          path = Path(os.environ["REPORT_PATH"])
          report = path.read_text(encoding="utf-8")
          ok = mb.send_briefing_email(
              report,
              path.name,
              os.environ["BRIEFING_LABEL"],
              path,
              website_url=os.environ.get("PAGE_URL") or mb.GITHUB_PAGES_URL,
          )
          raise SystemExit(0 if ok else 1)
          PY
